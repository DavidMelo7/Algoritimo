<script>
    velocidade = Number(window.prompt("qual a velocidade maxima da via"));
    veiculo = Number(window.prompt("qual a velocidade do veiculo"));

    if ((veiculo <  velocidade_via) || (veiculo >  velocidade)) {
        window.alert("vermelho");
    }
    else {
        window.alert("verde");
    }
</script>
