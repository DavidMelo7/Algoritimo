<meta charset="UTF-8">
<script>
    num = Number(window.prompt("qual é o numero?"));

    if ((num == 1) || (num == 3) || (num == 4) || (num == 6)) {
        window.alert("PRIMEIRA");
    }
    else if ((num == 2) || (num == 5)) {
        window.alert("SEGUNDA");
    }
    else {
        window.alert("TERCEIRA");
    }
</script>
