<meta charset="UTF-8">

<script>
    soma=0
    for(i = 1; i <= 5; i++){
        preco = Number(window.prompt("digite o preço"));
        tipo = window.prompt("digite o tipo").toUpperCase();
        switch (tipo){
            case "A" : desconto = 10;break
            case "B" : desconto = 5;break
            default: desconto = 0;
        }
        preco = preco - (preco * desconto / 100);
        soma += preco;
    }
    document.write("preço total: " + soma);
</script>
